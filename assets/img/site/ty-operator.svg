<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ty-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#ty-bg)"/>

  <!-- Decorative dots -->
  <g fill="#fb923c" opacity="0.4">
    <circle cx="100" cy="100" r="4"/>
    <circle cx="700" cy="130" r="5"/>
    <circle cx="660" cy="470" r="4"/>
    <circle cx="120" cy="490" r="4"/>
    <circle cx="140" cy="160" r="3"/>
    <circle cx="660" cy="170" r="3"/>
    <circle cx="200" cy="80" r="3"/>
    <circle cx="600" cy="510" r="3"/>
  </g>

  <!-- Sound waves emerging from headset -->
  <g stroke="#fb923c" stroke-width="4" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M 270 230 Q 220 280, 220 340"/>
    <path d="M 235 200 Q 165 280, 165 380"/>
    <path d="M 200 175 Q 110 280, 110 410"/>
    <path d="M 530 230 Q 580 280, 580 340"/>
    <path d="M 565 200 Q 635 280, 635 380"/>
    <path d="M 600 175 Q 690 280, 690 410"/>
  </g>

  <!-- Headset -->
  <g transform="translate(400, 320)">
    <!-- Headband -->
    <path d="M -110 0 Q -110 -100, 0 -100 Q 110 -100, 110 0"
          stroke="#0f172a" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Left earphone (outer + inner) -->
    <rect x="-130" y="-20" width="44" height="68" rx="16" fill="#0f172a"/>
    <rect x="-126" y="-16" width="36" height="60" rx="12" fill="#fb923c"/>
    <!-- Right earphone -->
    <rect x="86" y="-20" width="44" height="68" rx="16" fill="#0f172a"/>
    <rect x="90" y="-16" width="36" height="60" rx="12" fill="#fb923c"/>
    <!-- Microphone arm -->
    <path d="M -108 38 Q -100 90, -55 105"
          stroke="#0f172a" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Microphone capsule -->
    <ellipse cx="-45" cy="108" rx="16" ry="11" fill="#0f172a"/>
    <ellipse cx="-45" cy="108" rx="10" ry="6" fill="#fb923c"/>
  </g>
</svg>
